name: 分享学校食堂配置
description: 提交你学校的食堂/窗口配置，供其他同学一键导入
title: "[Config Share] <学校名称>"
labels:
  - community-config
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        感谢贡献！请按下面信息填写，方便维护者快速合并。

  - type: input
    id: school_name
    attributes:
      label: 学校名称
      placeholder: 例如：西安电子科技大学
    validations:
      required: true

  - type: input
    id: city
    attributes:
      label: 城市
      placeholder: 例如：西安
    validations:
      required: true

  - type: input
    id: config_file
    attributes:
      label: 配置文件链接
      description: 建议直接提交 PR；若暂时不会 PR，可先贴 raw JSON / 网盘链接
      placeholder: https://github.com/<user>/ChooseMeal/pull/123
    validations:
      required: true

  - type: textarea
    id: coverage
    attributes:
      label: 覆盖范围
      description: 简述包含哪些食堂/楼层/窗口
      placeholder: 例如：竹园食堂 1-3 楼、海棠食堂 1-2 楼
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 备注（可选）
      description: 可补充数据来源、更新频率、特殊说明

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已确认 JSON 可被 ChooseMeal 导入
          required: true
        - label: 我已确认 `id` 无重复，楼层与伙食引用关系正确
          required: true
        - label: 我同意该配置以开源形式在仓库中共享
          required: true
